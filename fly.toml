# fly.toml app configuration file generated for void-cast on 2026-04-29T15:12:24+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'void-cast'
primary_region = 'syd'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
  count = 1

[build.args]
  VITE_MAX_LINE_LENGTH = "25"
  VITE_MAX_LINES = "3"
  VITE_SHRINK_DURATION = "3000"
  VITE_NEW_CAST_SIZE_MULT = "16"
  VITE_INITIAL_ZOOM = "1"
  VITE_IDLE_TIMEOUT = "300000"
  VITE_INPUT_PLACEHOLDER = "into the void..."
